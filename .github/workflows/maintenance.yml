name: maintenance

# Daily housekeeping: re-discover the NIM model registry (--sync) and prune
# samples past the retention window + retire dead endpoints (--maintenance).
# Pruning is what keeps the database inside Supabase's free 0.5 GB tier; without
# it ModelSample grows unbounded.
#
# Triggered by the nimstats-cron Cloudflare Worker at 03:00 UTC (reliable) — NOT
# GitHub's best-effort `schedule:`, which never fired dependably. Manual runs via
# the Actions UI still work through workflow_dispatch.
run-name: "maintenance · ${{ github.event.inputs.source || github.event_name }}"

on:
  workflow_dispatch:
    inputs:
      source:
        description: "What triggered this run (set by the dispatcher)"
        required: false
        default: "manual"

concurrency:
  group: probe # share the probe lock so maintenance never overlaps a probe cycle
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
      NIM_API_URL: ${{ secrets.NIM_API_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run probe:once:ci -- --sync --maintenance
