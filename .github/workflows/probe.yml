name: probe

# The production data collector. Vercel Hobby can't run an always-on worker, so
# the probe cycle runs here. On a PUBLIC repo, Linux minutes are unlimited — $0.
#
# Primary cadence is driven externally (cron-job.org → /api/cron/trigger →
# workflow_dispatch), which fires promptly. The `schedule:` below is only a
# low-frequency SAFETY NET: if the external scheduler ever dies, GitHub still
# drips in hourly probes so the dashboard never goes fully stale. GitHub's
# scheduler is best-effort and may delay/drop runs, which is fine for a fallback.
run-name: "probe · ${{ github.event.inputs.source || github.event_name }}"

on:
  schedule:
    - cron: "0 * * * *" # hourly fallback only — cron-job.org drives the real cadence
  workflow_dispatch:
    inputs:
      source:
        description: "What triggered this run (set by the dispatcher)"
        required: false
        default: "manual"

# Never let two probe cycles overlap; if one is still running, skip the next.
concurrency:
  group: probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
      NIM_API_URL: ${{ secrets.NIM_API_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run probe:once:ci
