name: probe

# The production data collector. Vercel Hobby can't run an always-on worker and
# its cron fires at most once/day, so the probe cycle runs here instead. On a
# PUBLIC repo, Linux minutes are unlimited — this is the $0 backend.
#
# GitHub's scheduler has a 5-minute minimum and may delay/drop runs under load,
# so treat "every 5 minutes" as best-effort (the dashboard degrades gracefully
# to slightly older data, never breaks).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Never let two probe cycles overlap; if one is still running, skip the next.
concurrency:
  group: probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
      NIM_API_URL: ${{ secrets.NIM_API_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run probe:once:ci
